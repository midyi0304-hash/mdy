<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日のひとことアプリ</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .card {
      width: min(90vw, 520px);
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 12px;
    }

    p {
      margin: 0;
      line-height: 1.7;
    }

    #message {
      margin: 18px 0;
      padding: 14px;
      border-radius: 10px;
      background: #eef4ff;
      min-height: 52px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>今日のひとこと</h1>
    <p>ボタンを押すと、ランダムでひとことを表示します。</p>
    <div id="message">「ひとことを表示」ボタンを押してみましょう。</div>
    <button id="showBtn" type="button">ひとことを表示</button>
  </main>

  <script>
    const messages = [
      "小さく始めると、続けやすくなります。",
      "わからないときは、1つ前の手順に戻って確認しましょう。",
      "エラーは失敗ではなく、ヒントです。",
      "5分だけでも進めると、大きな前進です。",
      "今日の自分と昨日の自分を比べてみましょう。",
      "できたことを1つメモすると自信になります。"
    ];

    const button = document.getElementById("showBtn");
    const messageBox = document.getElementById("message");

    button.addEventListener("click", () => {
      const randomIndex = Math.floor(Math.random() * messages.length);
      messageBox.textContent = messages[randomIndex];
    });
  </script>
</body>
</html>
